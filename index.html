<html lang="id">
<head>

    <title>ULTRABOARD FACONPRO - KANDANG YR</title>

    <meta property="og:title" content="ULTRABOARD FACONPRO">
    <meta property="og:description" content="Webapp Manajemen Peternakan Praktis & Profesional.">
    <meta property="og:type" content="website">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            /* Background layar aplikasi utama putih */
            background-color: #ffffff;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }
        /* Loader dengan teks Hijau Tosca */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Warna Hijau Tosca */
            color: #008080;
            font-family: Arial, sans-serif;
            text-align: center;
            font-weight: bold;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="loader">Memuat Aplikasi Mohon Tunggu..Silahkan Refresh Jika Koneksi Terputus...</div>
    
    <iframe 
        src="https://script.google.com/macros/s/AKfycbwtkk02o1jOE-yfHhBDaxkPmuKHq7zEF9ehA0q2Dk8U0IRlxM_i4LInyCHVGcnLsDhdzw/exec" 
        onload="document.getElementById('loader').style.display='none';">
    </iframe>

</body>
</html>
